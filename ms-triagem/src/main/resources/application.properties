# Identidade do hospital (sobrescrita por variável de ambiente no deploy)
hospital.id=${HOSPITAL_ID:hosp-local-dev}

# DynamoDB
dynamodb.table.triagem=${DYNAMODB_TABLE_TRIAGEM:triagem-local}
quarkus.dynamodb.aws.region=${AWS_REGION:us-east-1}
quarkus.dynamodb.aws.credentials.type=default

# SQS
sqs.queue.classificacao.url=${SQS_CLASSIFICACAO_URL:http://sqs.us-east-1.localhost.localstack.cloud:4566/000000000000/classificacao-queue}
quarkus.sqs.aws.region=${AWS_REGION:us-east-1}
quarkus.sqs.aws.credentials.type=default

# Dev: apontar para LocalStack
%dev.quarkus.dynamodb.endpoint-override=http://localhost:4566
%dev.quarkus.sqs.endpoint-override=http://localhost:4566

# HTTP
quarkus.http.port=8080
%dev.quarkus.http.cors=true
%dev.quarkus.http.cors.origins=http://localhost:3000

# Logging
quarkus.log.level=INFO
quarkus.log.category."br.gov.sus".level=DEBUG
quarkus.log.console.json=true

# Lambda (only active in lambda profile)
%lambda.quarkus.lambda.handler=io.quarkus.amazon.lambda.http.QuarkusStreamHandler::handleRequest

# Health
quarkus.smallrye-health.root-path=/health
