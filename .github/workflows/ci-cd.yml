name: CI/CD — Sistema de Triagem Hospitalar

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  JAVA_VERSION: '21'

# ─────────────────────────────────────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Build e testes — ms-triagem ────────────────────────────────────────
  build-ms-triagem:
    name: Build ms-triagem
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms-triagem

    services:
      localstack:
        image: localstack/localstack:3.4
        ports: ["4566:4566"]
        env:
          SERVICES: sqs,dynamodb
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Criar recursos LocalStack
        run: |
          aws --endpoint-url=http://localhost:4566 --region us-east-1 \
            dynamodb create-table \
            --table-name triagem-local \
            --attribute-definitions \
              AttributeName=pk,AttributeType=S \
              AttributeName=sk,AttributeType=S \
            --key-schema \
              AttributeName=pk,KeyType=HASH \
              AttributeName=sk,KeyType=RANGE \
            --billing-mode PAY_PER_REQUEST
          aws --endpoint-url=http://localhost:4566 --region us-east-1 \
            sqs create-queue --queue-name classificacao-queue
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

      - name: Build e testes
        run: ./mvnw verify -B
        env:
          QUARKUS_DYNAMODB_ENDPOINT_OVERRIDE: http://localhost:4566
          QUARKUS_SQS_ENDPOINT_OVERRIDE: http://localhost:4566
          HOSPITAL_ID: hosp-ci-test
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1

      - name: Upload artefato Lambda
        uses: actions/upload-artifact@v4
        with:
          name: ms-triagem-function
          path: ms-triagem/target/function.zip
          retention-days: 1

  # ── 2. Build e testes — ms-manchester ─────────────────────────────────────
  build-ms-manchester:
    name: Build ms-manchester
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms-manchester

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build e testes (motor de regras puro — sem AWS)
        run: ./mvnw verify -B

      - name: Upload artefato Lambda
        uses: actions/upload-artifact@v4
        with:
          name: ms-manchester-function
          path: ms-manchester/target/function.zip
          retention-days: 1

  # ── 3. Build e testes — ms-consolidador ───────────────────────────────────
  build-ms-consolidador:
    name: Build ms-consolidador
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms-consolidador

    services:
      localstack:
        image: localstack/localstack:3.4
        ports: ["4566:4566"]
        env:
          SERVICES: sqs,dynamodb
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Criar recursos LocalStack
        run: |
          aws --endpoint-url=http://localhost:4566 --region us-east-1 \
            dynamodb create-table \
            --table-name triagem-local \
            --attribute-definitions \
              AttributeName=pk,AttributeType=S \
              AttributeName=sk,AttributeType=S \
            --key-schema \
              AttributeName=pk,KeyType=HASH \
              AttributeName=sk,KeyType=RANGE \
            --billing-mode PAY_PER_REQUEST
          aws --endpoint-url=http://localhost:4566 --region us-east-1 \
            sqs create-queue --queue-name nacional-queue
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test

      - name: Build e testes
        run: ./mvnw verify -B
        env:
          QUARKUS_DYNAMODB_ENDPOINT_OVERRIDE: http://localhost:4566
          QUARKUS_SQS_ENDPOINT_OVERRIDE: http://localhost:4566
          HOSPITAL_ID: hosp-ci-test
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1

      - name: Upload artefato Lambda
        uses: actions/upload-artifact@v4
        with:
          name: ms-consolidador-function
          path: ms-consolidador/target/function.zip
          retention-days: 1

  # ── 4. Build e testes — ms-painel-ws ──────────────────────────────────────
  build-ms-painel-ws:
    name: Build ms-painel-ws
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms-painel-ws

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build e testes
        run: ./mvnw verify -B

      - name: Upload artefato Lambda
        uses: actions/upload-artifact@v4
        with:
          name: ms-painel-ws-function
          path: ms-painel-ws/target/function.zip
          retention-days: 1

  # ── 5. Build e testes — ms-nacional-consumer ──────────────────────────────
  build-ms-nacional-consumer:
    name: Build ms-nacional-consumer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms-nacional-consumer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build e testes (H2 em memória)
        run: ./mvnw verify -B -Dquarkus.profile=test

      - name: Upload artefato Lambda
        uses: actions/upload-artifact@v4
        with:
          name: ms-nacional-consumer-function
          path: ms-nacional-consumer/target/function.zip
          retention-days: 1

  # ── 6. Build — painel-clinico ─────────────────────────────────────────────
  build-painel-clinico:
    name: Build painel-clinico
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: painel-clinico

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: painel-clinico/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build produção
        run: npm run build

      - name: Upload artefato frontend
        uses: actions/upload-artifact@v4
        with:
          name: painel-clinico-dist
          path: painel-clinico/dist/
          retention-days: 1

  # ── 7. Validação Terraform ─────────────────────────────────────────────────
  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: infra

      - name: Terraform init + validate (módulo hospital)
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: infra/modules/hospital

  # ── 8. Deploy para staging (push em develop) ──────────────────────────────
  deploy-staging:
    name: Deploy → staging
    runs-on: ubuntu-latest
    needs:
      - build-ms-triagem
      - build-ms-manchester
      - build-ms-consolidador
      - build-ms-painel-ws
      - build-ms-nacional-consumer
      - build-painel-clinico
      - terraform-validate
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Baixar todos os artefatos
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Reorganizar artefatos para deploy
        run: |
          cp artifacts/ms-triagem-function/function.zip           ms-triagem/target/function.zip
          cp artifacts/ms-manchester-function/function.zip        ms-manchester/target/function.zip
          cp artifacts/ms-consolidador-function/function.zip      ms-consolidador/target/function.zip
          cp artifacts/ms-painel-ws-function/function.zip         ms-painel-ws/target/function.zip
          cp artifacts/ms-nacional-consumer-function/function.zip ms-nacional-consumer/target/function.zip

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform apply — staging
        run: |
          terraform init
          terraform workspace select staging || terraform workspace new staging
          terraform apply -auto-approve \
            -var="env=staging" \
            -var="db_master_password=${{ secrets.DB_MASTER_PASSWORD }}"
        working-directory: infra/environments/prod

      - name: Deploy frontend → S3
        run: |
          BUCKET=$(terraform output -raw frontend_bucket_name 2>/dev/null || echo "sus-triagem-staging-frontend")
          aws s3 sync artifacts/painel-clinico-dist/ s3://$BUCKET/ --delete
          aws cloudfront create-invalidation \
            --distribution-id $(terraform output -raw cloudfront_distribution_id 2>/dev/null || echo "STAGING_CF_ID") \
            --paths "/*" || true
        working-directory: infra/environments/prod

  # ── 9. Deploy para produção (push em main) ────────────────────────────────
  deploy-prod:
    name: Deploy → produção
    runs-on: ubuntu-latest
    needs:
      - build-ms-triagem
      - build-ms-manchester
      - build-ms-consolidador
      - build-ms-painel-ws
      - build-ms-nacional-consumer
      - build-painel-clinico
      - terraform-validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Baixar todos os artefatos
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Reorganizar artefatos para deploy
        run: |
          mkdir -p ms-triagem/target ms-manchester/target ms-consolidador/target \
                   ms-painel-ws/target ms-nacional-consumer/target
          cp artifacts/ms-triagem-function/function.zip           ms-triagem/target/function.zip
          cp artifacts/ms-manchester-function/function.zip        ms-manchester/target/function.zip
          cp artifacts/ms-consolidador-function/function.zip      ms-consolidador/target/function.zip
          cp artifacts/ms-painel-ws-function/function.zip         ms-painel-ws/target/function.zip
          cp artifacts/ms-nacional-consumer-function/function.zip ms-nacional-consumer/target/function.zip

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform apply — produção
        run: |
          terraform init
          terraform workspace select prod || terraform workspace new prod
          terraform apply -auto-approve \
            -var="env=prod" \
            -var="db_master_password=${{ secrets.DB_MASTER_PASSWORD_PROD }}"
        working-directory: infra/environments/prod

      - name: Deploy frontend → S3
        run: |
          aws s3 sync artifacts/painel-clinico-dist/ \
            s3://sus-triagem-prod-frontend/ --delete
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID_PROD }} \
            --paths "/*"
