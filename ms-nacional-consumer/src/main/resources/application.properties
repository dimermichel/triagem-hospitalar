# Aurora PostgreSQL nacional
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:susadmin}
quarkus.datasource.password=${DB_PASSWORD:changeme}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/triagem_nacional}

# Pool otimizado para Lambda (conexões curtas)
quarkus.datasource.jdbc.min-size=1
quarkus.datasource.jdbc.max-size=5
quarkus.datasource.jdbc.acquisition-timeout=10s
quarkus.datasource.jdbc.idle-removal-interval=30s

# Flyway — migrations automáticas na inicialização
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# HTTP
quarkus.http.port=8083
%dev.quarkus.lambda.mock-event-server.dev-port=8088

# Lambda handler
quarkus.lambda.handler=nacional-consumer

# Logging
quarkus.log.level=INFO
quarkus.log.console.json=true

# SQS — dev/test: desativa DevServices (evita Docker/LocalStack)
%dev.quarkus.sqs.devservices.enabled=false
%dev.quarkus.sqs.endpoint-override=${SQS_ENDPOINT:http://localhost:4566}
%dev.quarkus.sqs.aws.region=${AWS_REGION:us-east-1}
%dev.quarkus.sqs.aws.credentials.type=static
%dev.quarkus.sqs.aws.credentials.static-provider.access-key-id=${AWS_ACCESS_KEY_ID:test}
%dev.quarkus.sqs.aws.credentials.static-provider.secret-access-key=${AWS_SECRET_ACCESS_KEY:test}

%test.quarkus.sqs.devservices.enabled=false
%test.quarkus.sqs.endpoint-override=${SQS_ENDPOINT:http://localhost:4566}
%test.quarkus.sqs.aws.region=${AWS_REGION:us-east-1}
%test.quarkus.sqs.aws.credentials.type=static
%test.quarkus.sqs.aws.credentials.static-provider.access-key-id=${AWS_ACCESS_KEY_ID:test}
%test.quarkus.sqs.aws.credentials.static-provider.secret-access-key=${AWS_SECRET_ACCESS_KEY:test}

# Aurora PostgreSQL — dev
%dev.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/triagem_dev}
%dev.quarkus.datasource.username=${DB_USERNAME:susadmin}
%dev.quarkus.datasource.password=${DB_PASSWORD:changeme}

# Aurora PostgreSQL — test (H2 não suporta sintaxe PostgreSQL usada nas queries)
%test.quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.jdbc.url=${TEST_DB_URL:jdbc:postgresql://localhost:5432/triagem_test}
%test.quarkus.datasource.username=${TEST_DB_USERNAME:susadmin}
%test.quarkus.datasource.password=${TEST_DB_PASSWORD:changeme}
%test.quarkus.flyway.migrate-at-start=true
